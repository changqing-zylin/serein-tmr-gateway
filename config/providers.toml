# ------------------------------------------------------------------------------
# NODE A: APAC INTELLIGENCE (SOVEREIGN INFRASTRUCTURE)
# ------------------------------------------------------------------------------
# Moonshot (Kimi) replaces Groq for local stability and lower latency.
[[provider]]
id = "moonshot"
display_name = "Moonshot-v1 (Kimi)"
api_format = "openai"
base_url = "https://api.moonshot.cn/v1"
model = "moonshot-v1-8k"
api_key_env = "MOONSHOT_API_KEY"
timeout_ms = 15000
max_response_bytes = 2097152
cache_provider = "moonshot"
temperature = 0.0
max_tokens = 4096
max_retries = 2
concurrency_limit = 15

